<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="reset.css" />
    <script src="script.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div id="game">
      <div id="sidebar">
        <div id="vehicles">
          <div class="trucks" draggable="true" data-name="VLCDG">
            <img src="assets/image/trucks/VLU-SDIS04-3.jpg" alt="" />
          </div>
          <div class="trucks" draggable="true" data-name="VSAV">
            <img src="assets/image/trucks/VSAV-site-web-min.png" alt="" />
          </div>
          <div class="trucks" draggable="true" data-name="VSR">
            <img src="assets/image/trucks/MG_0496.jpg" alt="" />
          </div>
          <div class="trucks" draggable="true" data-name="VPR">
            <img src="assets/image/trucks/vpr.jpg" alt="" />
          </div>
        </div>
        <button id="finished">Terminé</button>
      </div>
      <div id="mainWindow"><div id="debugPoint"></div></div>
      <div id="buttons">
        <button id="addDist">
          <img src="assets/image/icon/route.png" alt="" />
        </button>
        <button id="addCone">
          <img src="assets/image/icon/traffic-cone.png" alt="" />
        </button>
        <button id="addTriangle">
          <img src="assets/image/icon/warning.png" alt="" />
        </button>
      </div>
      <div id="timer">00:00</div>
    </div>
    <div id="contextMenu">
      <button id="deleteBtn">Delete</button>
    </div>
    <div id="mapOverlay"></div>
    <div id="timeUpPopup">
      <img src="assets/image/suraccident.jpeg" id="suraccident" alt="" />
      TEMPS ÉCOULÉ
      <p>Le suraccident n'a pas pu être évité...</p>
      <button onclick="location.reload()">REJOUER</button>
    </div>
  </body>
</html>
